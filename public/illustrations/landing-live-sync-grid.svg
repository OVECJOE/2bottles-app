<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">2bottles live sync grid</title>
  <desc id="desc">A live synchronization dashboard showing partner status, ETA signals, and event stream updates.</desc>

